services:
  database:
    image: postgres:16
    container_name: budget-db
    environment:
      POSTGRES_DB: budget-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - transaction_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d budget-db"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  transaction_data: